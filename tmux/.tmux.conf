set-option -g default-shell /opt/homebrew/bin/fish

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

unbind C-b
set -g prefix C-j

# Enable true color support
set -sg terminal-overrides ",*:RGB"

# Forward terminal focus changes to apps like Neovim so autoread can detect external file changes.
set -g focus-events on

# remove the status bar green color
set -g status-style bg=default

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

set -g status-left-length 40

# Capture mouse wheel events so Ghostty does not translate them into history
# keys or raw escape text at a normal prompt.
set -g mouse on
bind -T root WheelUpPane if -F "#{alternate_on}" "send-keys -M"
bind -T root WheelDownPane if -F "#{alternate_on}" "send-keys -M"

# Active window highlight. Update these lines to change the active window color.
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bold] #I:#W #[default]"
set -g window-status-current-style "fg=black,bg=colour250,bold"
set -g status-right ""

# make C-z work for suspending process inside tmux
bind-key C-z send-prefix

# vim in scroll mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

bind-key -T copy-mode-vi y send -X copy-pipe-no-clear 'pbcopy'
bind-key -T copy-mode-vi Y send -X select-line \; send -X copy-pipe-no-clear 'pbcopy'

# Open new windows and splits in the current pane's directory.
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
