set-option -g default-shell /opt/homebrew/bin/fish

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

unbind C-b
set -g prefix C-j

# Enable true color support and disable alternate-screen switching so wheel
# scrolling uses terminal scrollback instead of sending raw arrow-key escapes.
set -sg terminal-overrides ",*:RGB,xterm*:smcup@:rmcup@"

set -g status-style "bg=default"

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

set -g status-right ""

# make C-z work for suspending process inside tmux
bind-key C-z send-prefix

# vim in scroll mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

set -s copy-command 'pbcopy'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# Open new splits in the current pane's directory.
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

